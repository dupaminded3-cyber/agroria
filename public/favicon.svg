<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0DCA6"/>
      <stop offset="0.5" stop-color="#C0A063"/>
      <stop offset="1" stop-color="#8C7043"/>
    </linearGradient>
  </defs>

  <!-- gouden driehoek-frame (de 'A') — doorzichtige achtergrond -->
  <path d="M32 5 L59 57 L5 57 Z M32 18 L48 52 L16 52 Z" fill="url(#goud)" fill-rule="evenodd"/>

  <!-- korenaar links -->
  <g fill="url(#goud)" stroke="#8C7043" stroke-width="0.4">
    <path d="M20 55 C 16 44, 14 32, 15 21" fill="none" stroke="url(#goud)" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="12.5" cy="24" rx="2.4" ry="4" transform="rotate(-32 12.5 24)"/>
    <ellipse cx="17.6" cy="25" rx="2.4" ry="4" transform="rotate(28 17.6 25)"/>
    <ellipse cx="12.8" cy="31" rx="2.4" ry="4" transform="rotate(-32 12.8 31)"/>
    <ellipse cx="17.9" cy="32" rx="2.4" ry="4" transform="rotate(28 17.9 32)"/>
    <ellipse cx="13.6" cy="38" rx="2.4" ry="4" transform="rotate(-32 13.6 38)"/>
    <ellipse cx="18.6" cy="39" rx="2.4" ry="4" transform="rotate(28 18.6 39)"/>
    <ellipse cx="15" cy="18.5" rx="2.2" ry="4" transform="rotate(-4 15 18.5)"/>
  </g>

  <!-- groen veld met gouden voren -->
  <path d="M17 52 Q32 44 47 52 L47 55 Q32 48 17 55 Z" fill="#2F5A2C"/>
  <path d="M17 52 Q32 44 47 52" fill="none" stroke="#D8B96A" stroke-width="1.2"/>
  <path d="M20 54 Q32 47.5 44 54" fill="none" stroke="#D8B96A" stroke-width="0.8" opacity="0.8"/>

  <!-- kleine trekker rechts -->
  <g>
    <rect x="30" y="38" width="12" height="6" rx="1.3" fill="#2C5327"/>
    <path d="M32 38 L33.5 33 H38 L39 38 Z" fill="#3A6B31"/>
    <circle cx="39" cy="45.5" r="4.4" fill="#243A1E"/>
    <circle cx="39" cy="45.5" r="1.8" fill="#D8B96A"/>
    <circle cx="31.3" cy="46" r="2.8" fill="#243A1E"/>
    <circle cx="31.3" cy="46" r="1.1" fill="#D8B96A"/>
  </g>
</svg>
