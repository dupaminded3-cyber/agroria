# Render-configuratie voor Roelfsema Totaalonderhoud.
#
# Belangrijk: een persistente schijf (waarop offerteaanvragen en foto's
# blijven bewaard) is bij Render alleen beschikbaar op een BETAALD plan. Het
# gratis plan wist de opslag bij elke herstart.
#
# Deze schijf wordt gekoppeld op /var/data, en de app schrijft daar naartoe
# dankzij de omgevingsvariabele DATA_DIR.

services:
  - type: web
    name: roelfsema-totaalonderhoud
    runtime: node
    rootDir: roelfsema-totaalonderhoud
    plan: starter          # betaald plan; nodig voor een persistente schijf
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false           # stel dit zelf in het Render-dashboard in (optioneel)
    disk:
      name: roelfsema-data
      mountPath: /var/data
      sizeGB: 1
